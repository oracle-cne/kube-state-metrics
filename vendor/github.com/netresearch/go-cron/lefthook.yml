# Lefthook - Git hooks manager
# https://github.com/evilmartians/lefthook
#
# Install: go install github.com/evilmartians/lefthook@latest
# Setup:   lefthook install

pre-commit:
  parallel: true
  jobs:
    - name: tidy
      run: |
        if ! go mod tidy -diff >/dev/null 2>&1; then
          echo "❌ go.mod is not tidy. Differences:"
          go mod tidy -diff
          echo ""
          echo "Run 'go mod tidy' and commit the changes."
          exit 1
        fi

    - name: fmt
      glob: "*.go"
      run: gofmt -l -w {staged_files} && git add {staged_files}
      stage_fixed: true

    - name: lint
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~1 --fix
      stage_fixed: true

    - name: build
      run: go build ./...

    - name: gitleaks
      run: |
        if command -v gitleaks &> /dev/null; then
          gitleaks protect --staged --no-banner --redact
        else
          echo "Warning: gitleaks not installed, skipping secret scan"
          echo "Install: brew install gitleaks (macOS) or go install github.com/gitleaks/gitleaks/v8@latest"
        fi

pre-push:
  parallel: true
  jobs:
    - name: test
      run: CGO_ENABLED=1 go test -race -short ./...

    - name: lint-full
      run: golangci-lint run --timeout=3m ./...

    - name: vulncheck
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

prepare-commit-msg:
  jobs:
    - name: add-signoff
      run: |
        # Auto-add Signed-off-by trailer if not already present.
        # {1} is the commit message file path provided by git.
        MSG_FILE="{1}"
        SIGNOFF="Signed-off-by: $(git config user.name) <$(git config user.email)>"
        if ! grep -qF "$SIGNOFF" "$MSG_FILE"; then
          # Add a blank line before the trailer if the file doesn't end with one
          if [ -n "$(tail -c1 "$MSG_FILE")" ]; then
            echo "" >> "$MSG_FILE"
          fi
          echo "" >> "$MSG_FILE"
          echo "$SIGNOFF" >> "$MSG_FILE"
        fi

commit-msg:
  jobs:
    - name: conventional-commit
      run: |
        MSG=$(cat {1})
        if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .{1,}$"; then
          echo "Error: Commit message must follow Conventional Commits format"
          echo "Format: type(scope): description"
          echo "Types: feat, fix, docs, style, refactor, test, chore, perf, ci, build, revert"
          exit 1
        fi

    - name: dco-signoff
      run: |
        # Verify that every commit has a Signed-off-by trailer (DCO requirement).
        MSG=$(cat {1})
        if ! echo "$MSG" | grep -qE "^Signed-off-by: .+ <.+>"; then
          echo "Error: Commit message must contain a DCO sign-off."
          echo "Expected trailer: Signed-off-by: Your Name <your@email>"
          echo ""
          echo "Add it with: git commit -s"
          echo "Or amend:    git commit --amend -s --no-edit"
          echo ""
          echo "See https://developercertificate.org/ for details."
          exit 1
        fi
